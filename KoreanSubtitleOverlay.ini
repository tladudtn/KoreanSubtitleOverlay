; KoreanSubtitleOverlay 설정 파일
; 이 파일을 KoreanSubtitleOverlay.asi와 같은 폴더에 두세요
; (modloader\_BASIC\KoreanSubtitleOverlay\).
; 값을 바꾼 뒤에는 게임을 완전히 재시작해야 적용됩니다.

[Subtitle]
; 자막 글자 크기(픽셀). 기본값 39.
FontSize=39

; 자막 위치를 화면 중앙 하단 기준으로 얼마나 옮길지(픽셀).
; OffsetX는 오른쪽(+)/왼쪽(-), OffsetY는 아래(+)/위(-) 방향입니다.
OffsetX=0
OffsetY=0

; 디버그 로그. yes로 켜면 KoreanSubtitleOverlay.log에 매 프레임/매 줄
; 단위의 상세 진단 정보(원본 바이트, 자막 슬롯 선택, 표시 전환 시점 등)가
; 추가로 기록됩니다. 평소에는 no를 권장합니다(로그 파일이 커짐).
Debug=no
